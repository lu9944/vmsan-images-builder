name: Build MaxKB Pro rootfs

on:
  push:
    branches: [main]
    paths:
      - 'images/maxkb/**'
      - 'build.sh'
      - '.github/workflows/build-maxkb.yml'
  workflow_dispatch:
    inputs:
      image_size:
        description: 'Minimum image size in MB'
        required: false
        default: '2048'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y e2fsprogs && break
            echo "Retry $i: apt-get failed, retrying in 10s..."
            sleep 10
          done

      - name: Prepare dummy source directory
        run: mkdir -p /tmp/maxkb-source

      - name: Build rootfs image
        run: |
          chmod +x build.sh
          ./build.sh \
            --image maxkb \
            --source-dir /tmp/maxkb-source \
            --size "${{ inputs.image_size || '2048' }}" \
            --no-docker-cache

      - name: Install vmsan
        run: curl -fsSL https://vmsan.dev/install | sudo bash

      - name: Download Docker-capable kernel
        run: |
          curl -fSL -o /tmp/vmlinux-6.1-docker \
            "https://github.com/lu9944/firecracker/releases/download/docker-kernel-6.1.172-20260610012612/vmlinux-6.1.172-docker"
          ls -lh /tmp/vmlinux-6.1-docker

      - name: Test VM boot with vmsan
        timeout-minutes: 10
        continue-on-error: true
        run: |
          set -euo pipefail

          IMAGE="$(pwd)/maxkb-rootfs.ext4"
          KERNEL="/tmp/vmlinux-6.1-docker"
          echo "=== Booting VM from $IMAGE ($(du -sh "$IMAGE" | cut -f1)) with Docker kernel ==="

          VM_OUT=$(sudo env "PATH=$PATH" vmsan create \
            --rootfs "$IMAGE" \
            --kernel "$KERNEL" \
            --memory 2048 \
            --vcpus 2 \
            --publish-port 8080 \
            --json || true)

          echo "=== vmsan create output ==="
          echo "$VM_OUT"
          echo "=== end output ==="

          VM_ID=$(echo "$VM_OUT" | grep -oE '"vmId"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | grep -oE '"[^"]*"$' | tr -d '"')
          echo "VM ID: $VM_ID"

          if [ -z "$VM_ID" ]; then
            echo "ERROR: No VM ID returned from vmsan create"
            exit 1
          fi

          echo "=== Waiting for VM to boot ==="
          for i in $(seq 1 24); do
            sleep 5
            if sudo env "PATH=$PATH" vmsan exec "$VM_ID" echo "ok" 2>/dev/null | grep -q "ok"; then
              STATUS="running"
            else
              STATUS="waiting"
            fi
            echo "  attempt $i: status=$STATUS"
            if [ "$STATUS" = "running" ]; then break; fi
          done

          if [ "$STATUS" != "running" ]; then
            echo "ERROR: VM did not reach running state"
            sudo env "PATH=$PATH" vmsan remove --force "$VM_ID" 2>/dev/null || true
            exit 1
          fi

          echo "=== Running command inside VM ==="
          sudo env "PATH=$PATH" vmsan exec "$VM_ID" echo "VM is alive"

          echo "=== Checking systemd services ==="
          sudo env "PATH=$PATH" vmsan exec "$VM_ID" systemctl is-active containerd docker

          echo "=== Checking Docker ==="
          sudo env "PATH=$PATH" vmsan exec "$VM_ID" sudo docker info 2>&1 | head -20 || echo "docker info failed"
          sudo env "PATH=$PATH" vmsan exec "$VM_ID" sudo docker compose version 2>&1 || echo "docker compose version failed"

          echo "=== Cleanup ==="
          sudo env "PATH=$PATH" vmsan stop "$VM_ID"
          sudo env "PATH=$PATH" vmsan remove "$VM_ID"

          echo "=== VM test passed ==="

      - name: Generate filename
        id: meta
        run: |
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          BASENAME="maxkb-base-rootfs-${TIMESTAMP}"
          echo "basename=${BASENAME}" >> "$GITHUB_OUTPUT"
          echo "ext4=${BASENAME}.ext4" >> "$GITHUB_OUTPUT"
          echo "gz=${BASENAME}.ext4.gz" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.basename }}
          name: "MaxKB base rootfs ${{ steps.meta.outputs.basename }}"
          body: |
            Base Docker rootfs (Ubuntu 24.04 + systemd + Docker)
            - **Compressed**: `${{ steps.meta.outputs.gz }}` (gzip)
            - **Kernel**: Docker-capable vmlinux-6.1.172 (TUN/MACVLAN/IPVS/netfilter/nf_tables)
            - **Pre-installed**: Docker CE + compose plugin + dev tools
            - **No application**: upload mkb-pro.tar.gz and install manually

            ### Usage
            ```bash
            # Download Docker kernel
            curl -fSL -o /tmp/vmlinux-6.1-docker \
              "https://github.com/lu9944/firecracker/releases/download/docker-kernel-6.1.172-20260610012612/vmlinux-6.1.172-docker"

            # Launch VM
            sudo env "PATH=$PATH" vmsan create \
              --kernel /tmp/vmlinux-6.1-docker \
              --rootfs maxkb-base-rootfs.ext4 \
              --memory 2048 \
              --vcpus 2 \
              --publish-port 8080
            ```
          files: ./maxkb-rootfs.ext4.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
