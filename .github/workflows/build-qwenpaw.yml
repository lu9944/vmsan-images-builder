name: Build qwenpaw rootfs

on:
  push:
    branches: [main]
    paths:
      - 'images/qwenpaw/**'
      - 'build.sh'
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'QwenPaw git ref (branch/tag/commit). Leave empty to use latest release.'
        required: false
        default: ''
      image_size:
        description: 'Minimum image size in MB'
        required: false
        default: '2048'
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest QwenPaw release tag
        id: resolve_ref
        if: github.event.inputs.source_ref == ''
        run: |
          LATEST_TAG=$(curl -sf "https://api.github.com/repos/agentscope-ai/QwenPaw/releases/latest" | python3 -c "import json,sys;print(json.load(sys.stdin)['tag_name'])")
          echo "ref=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved latest release: $LATEST_TAG"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Build rootfs image
        run: |
          chmod +x build.sh
          ./build.sh \
            --image qwenpaw \
            --size "${{ github.event.inputs.image_size || '2048' }}" \
            --no-docker-cache
        env:
          SOURCE_REF: ${{ github.event.inputs.source_ref || steps.resolve_ref.outputs.ref }}

      - name: Install vmsan
        run: curl -fsSL https://vmsan.dev/install | sudo bash

      - name: Test VM boot with vmsan
        timeout-minutes: 5
        run: |
          set -euo pipefail

          IMAGE="$(pwd)/qwenpaw-rootfs.ext4"
          echo "=== Booting VM from $IMAGE ==="

          VM_JSON=$(sudo env "PATH=$PATH" vmsan create \
            --rootfs "$IMAGE" \
            --memory 512 \
            --vcpus 1 \
            --json 2>&1) || {
            echo "=== vmsan create failed ==="
            echo "$VM_JSON"
            exit 1
          }

          VM_ID=$(echo "$VM_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id',''))")
          echo "VM ID: $VM_ID"

          if [ -z "$VM_ID" ]; then
            echo "ERROR: No VM ID returned"
            exit 1
          fi

          echo "=== Checking VM status ==="
          sleep 5
          STATUS=$(vmsan list --json | python3 -c "
          import json, sys
          vms = json.load(sys.stdin)
          vm = next((v for v in vms if v['id'] == '$VM_ID'), None)
          print(vm['status'] if vm else 'not_found')
          ")
          echo "VM status: $STATUS"

          if [ "$STATUS" != "running" ]; then
            echo "ERROR: VM is not running (status=$STATUS)"
            sudo env "PATH=$PATH" vmsan remove --force "$VM_ID" 2>/dev/null || true
            exit 1
          fi

          echo "=== Running command inside VM ==="
          vmsan exec "$VM_ID" echo "VM is alive"

          echo "=== Cleanup ==="
          sudo env "PATH=$PATH" vmsan stop "$VM_ID"
          sudo env "PATH=$PATH" vmsan remove "$VM_ID"

          echo "=== VM test passed ==="

      - name: Generate filename
        id: meta
        run: |
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          REF="${{ github.event.inputs.source_ref || steps.resolve_ref.outputs.ref }}"
          BASENAME="qwenpaw-rootfs-${REF}-${TIMESTAMP}"
          echo "basename=${BASENAME}" >> "$GITHUB_OUTPUT"
          echo "ext4=${BASENAME}.ext4" >> "$GITHUB_OUTPUT"
          echo "gz=${BASENAME}.ext4.gz" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.basename }}
          name: "QwenPaw rootfs ${{ steps.meta.outputs.basename }}"
          body: |
            Built from QwenPaw `${{ github.event.inputs.source_ref || steps.resolve_ref.outputs.ref }}`
            - **Compressed**: `${{ steps.meta.outputs.gz }}` (gzip)
          files: ./qwenpaw-rootfs.ext4.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
