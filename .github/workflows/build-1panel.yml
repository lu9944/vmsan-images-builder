name: Build 1panel rootfs

on:
  push:
    branches: [main]
    paths:
      - 'images/1panel/**'
      - 'build.sh'
      - '.github/workflows/build-1panel.yml'
  workflow_dispatch:
    inputs:
      source_ref:
        description: '1Panel git ref (branch/tag/commit). Leave empty to use latest release.'
        required: false
        default: ''
      image_size:
        description: 'Minimum image size in MB'
        required: false
        default: '4096'
  # schedule:
  #   - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest 1Panel release tag
        id: resolve_ref
        if: github.event.inputs.source_ref == ''
        run: |
          LATEST_TAG=$(curl -sf "https://api.github.com/repos/1Panel-dev/1Panel/releases/latest" | python3 -c "import json,sys;print(json.load(sys.stdin)['tag_name'])")
          echo "ref=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved latest release: $LATEST_TAG"

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y e2fsprogs && break
            echo "Retry $i: apt-get failed, retrying in 10s..."
            sleep 10
          done

      - name: Build rootfs image
        run: |
          chmod +x build.sh
          ./build.sh \
            --image 1panel \
            --size "${{ github.event.inputs.image_size || '4096' }}" \
            --no-docker-cache
        env:
          SOURCE_REF: ${{ github.event.inputs.source_ref || steps.resolve_ref.outputs.ref }}

      - name: Install vmsan
        run: curl -fsSL https://vmsan.dev/install | sudo bash

      - name: Download Docker-capable kernel
        run: |
          curl -fSL -o /tmp/vmlinux-6.1-docker \
            "https://github.com/lu9944/firecracker/releases/download/docker-kernel-6.1.172-20260610012612/vmlinux-6.1.172-docker"
          ls -lh /tmp/vmlinux-6.1-docker

      - name: Test VM boot with vmsan
        timeout-minutes: 10
        continue-on-error: true
        run: |
          set -euo pipefail

          IMAGE="$(pwd)/1panel-rootfs.ext4"
          KERNEL="/tmp/vmlinux-6.1-docker"
          echo "=== Booting VM from $IMAGE ($(du -sh "$IMAGE" | cut -f1)) with Docker kernel ==="

          VM_OUT=$(sudo env "PATH=$PATH" vmsan create \
            --rootfs "$IMAGE" \
            --kernel "$KERNEL" \
            --memory 2048 \
            --vcpus 2 \
            --publish-port 8888 \
            --json || true)

          echo "=== vmsan create output ==="
          echo "$VM_OUT"
          echo "=== end output ==="

          VM_ID=$(echo "$VM_OUT" | grep -oE '"vmId"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | grep -oE '"[^"]*"$' | tr -d '"')
          echo "VM ID: $VM_ID"

          if [ -z "$VM_ID" ]; then
            echo "ERROR: No VM ID returned from vmsan create"
            exit 1
          fi

          echo "=== Waiting for VM to boot ==="
          for i in $(seq 1 24); do
            sleep 5
            if sudo env "PATH=$PATH" vmsan exec "$VM_ID" echo "ok" 2>/dev/null | grep -q "ok"; then
              STATUS="running"
            else
              STATUS="waiting"
            fi
            echo "  attempt $i: status=$STATUS"
            if [ "$STATUS" = "running" ]; then break; fi
          done

          if [ "$STATUS" != "running" ]; then
            echo "ERROR: VM did not reach running state"
            sudo env "PATH=$PATH" vmsan remove --force "$VM_ID" 2>/dev/null || true
            exit 1
          fi

          echo "=== Running command inside VM ==="
          sudo env "PATH=$PATH" vmsan exec "$VM_ID" echo "VM is alive"

          echo "=== Checking systemd services ==="
          sudo env "PATH=$PATH" vmsan exec "$VM_ID" systemctl is-active 1panel-core containerd docker

          echo "=== Checking Docker ==="
          sudo env "PATH=$PATH" vmsan exec "$VM_ID" sudo docker info 2>&1 | head -20 || echo "docker info failed"
          sudo env "PATH=$PATH" vmsan exec "$VM_ID" sudo docker ps 2>&1 || echo "docker ps failed"

          echo "=== Cleanup ==="
          sudo env "PATH=$PATH" vmsan stop "$VM_ID"
          sudo env "PATH=$PATH" vmsan remove "$VM_ID"

          echo "=== VM test passed ==="

      - name: Generate filename
        id: meta
        run: |
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          REF="${{ github.event.inputs.source_ref || steps.resolve_ref.outputs.ref }}"
          BASENAME="1panel-rootfs-${REF}-${TIMESTAMP}"
          echo "basename=${BASENAME}" >> "$GITHUB_OUTPUT"
          echo "ext4=${BASENAME}.ext4" >> "$GITHUB_OUTPUT"
          echo "gz=${BASENAME}.ext4.gz" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.basename }}
          name: "1Panel rootfs ${{ steps.meta.outputs.basename }}"
          body: |
            Built from 1Panel `${{ github.event.inputs.source_ref || steps.resolve_ref.outputs.ref }}`
            - **Compressed**: `${{ steps.meta.outputs.gz }}` (gzip)
            - **Kernel**: Docker-capable vmlinux-6.1 (TUN/MACVLAN/IPVS/netfilter)
            - **Port**: 8888
            - **Entrance**: /1panel
            - **Username**: 1panel
            - **Password**: 1panel
          files: ./1panel-rootfs.ext4.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
